name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "output/**"
      - "templates/**"
      - "static/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p site
          cp templates/index.html site/
          cp static/favicon.png static/logo.png site/
          cp output/summary.json site/
          if [ -f output/changelog.json ]; then
            cp output/changelog.json site/
          else
            echo "[]" > site/changelog.json
          fi
          cp -r output/specs site/specs
          cp -r output/collections site/collections

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

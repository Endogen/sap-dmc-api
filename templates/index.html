<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Digital Manufacturing Cloud — API Browser</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3343;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #4e9af5;
    --accent2: #3a7bd5;
    --green: #3ddc84;
    --orange: #f5a623;
    --red: #f5564e;
    --tag-bg: #262b3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .header p {
    color: var(--text2);
    font-size: 14px;
  }
  .stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
  }
  .stat {
    font-size: 13px;
    color: var(--text2);
  }
  .stat strong {
    color: var(--accent);
    font-size: 18px;
    margin-right: 4px;
  }
  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    flex: 1;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }
  .result-count {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }
  .api-grid {
    padding: 16px 32px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 12px;
  }
  .api-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .api-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .api-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .api-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .api-version {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--tag-bg);
    border-radius: 4px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .api-desc {
    font-size: 13px;
    color: var(--text2);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .api-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
  }
  .api-meta span { display: flex; align-items: center; gap: 4px; }
  .api-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
    padding-top: 4px;
  }
  .btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }

  /* Swagger UI page */
  .swagger-page { display: none; }
  .swagger-page.active { display: block; }
  .landing-page.hidden { display: none; }
  .swagger-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .swagger-header .back-btn {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    font-family: inherit;
  }
  .swagger-header .back-btn:hover { text-decoration: underline; }
  .swagger-header .api-title {
    font-size: 16px;
    font-weight: 600;
  }
  #swagger-container {
    background: #fff;
    min-height: calc(100vh - 52px);
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px;
    color: var(--text2);
    font-size: 15px;
  }

  @media (max-width: 600px) {
    .header, .controls, .api-grid { padding-left: 16px; padding-right: 16px; }
    .api-grid { grid-template-columns: 1fr; }
    .stats { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>

<!-- Landing Page -->
<div class="landing-page" id="landing">
  <div class="header">
    <h1>SAP Digital Manufacturing Cloud — APIs</h1>
    <p>Browse and explore all API specifications from the SAP DMC package</p>
    <div class="stats">
      <div class="stat"><strong id="api-count">0</strong> APIs</div>
      <div class="stat"><strong id="endpoint-count">0</strong> Endpoints</div>
      <div class="stat"><strong id="schema-count">0</strong> Schemas</div>
    </div>
  </div>
  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Search APIs by name, description, or endpoint path..." autocomplete="off">
    <span class="result-count" id="result-count"></span>
  </div>
  <div class="api-grid" id="api-grid"></div>
</div>

<!-- Swagger UI Page -->
<div class="swagger-page" id="swagger-page">
  <div class="swagger-header">
    <button class="back-btn" onclick="showLanding()">&#8592; Back to APIs</button>
    <span class="api-title" id="swagger-title"></span>
  </div>
  <div id="swagger-container"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>

<script>
let apis = [];

async function init() {
  const resp = await fetch('/summary.json');
  apis = await resp.json();

  // Stats
  let totalEndpoints = 0, totalSchemas = 0;
  apis.forEach(a => { totalEndpoints += a.endpoint_count; totalSchemas += a.schema_count; });
  document.getElementById('api-count').textContent = apis.length;
  document.getElementById('endpoint-count').textContent = totalEndpoints;
  document.getElementById('schema-count').textContent = totalSchemas;

  renderGrid(apis);

  // Check if URL hash has a spec to show
  if (location.hash.startsWith('#/spec/')) {
    const name = decodeURIComponent(location.hash.slice(7));
    const api = apis.find(a => a.name === name);
    if (api) showSwagger(api.name, api.display_name);
  }
}

function renderGrid(list) {
  const grid = document.getElementById('api-grid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">No APIs match your search.</div>';
    document.getElementById('result-count').textContent = '0 results';
    return;
  }
  document.getElementById('result-count').textContent = list.length === apis.length ? '' : list.length + ' result' + (list.length !== 1 ? 's' : '');

  grid.innerHTML = list.map(api => `
    <div class="api-card">
      <div class="api-card-head">
        <span class="api-name">${esc(api.display_name)}</span>
        <span class="api-version">${esc(api.api_version || api.version || '—')}</span>
      </div>
      <div class="api-desc">${esc(api.description || 'No description')}</div>
      <div class="api-meta">
        <span>${api.endpoint_count} endpoint${api.endpoint_count !== 1 ? 's' : ''}</span>
        <span>${api.schema_count} schema${api.schema_count !== 1 ? 's' : ''}</span>
        <span>Spec ${esc(api.spec_version)}</span>
      </div>
      <div class="api-actions">
        <a class="btn btn-primary" href="#/spec/${encodeURIComponent(api.name)}" onclick="showSwagger('${esc(api.name)}', '${esc(api.display_name)}')">View API</a>
        <a class="btn btn-secondary" href="/specs/${encodeURIComponent(api.name)}.json" target="_blank">Download JSON</a>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { renderGrid(apis); return; }
  const filtered = apis.filter(a => {
    if ((a.display_name || '').toLowerCase().includes(q)) return true;
    if ((a.description || '').toLowerCase().includes(q)) return true;
    if ((a.name || '').toLowerCase().includes(q)) return true;
    if (a.endpoints && a.endpoints.some(e => (e.path || '').toLowerCase().includes(q) || (e.summary || '').toLowerCase().includes(q))) return true;
    return false;
  });
  renderGrid(filtered);
});

function showSwagger(name, displayName) {
  document.getElementById('landing').classList.add('hidden');
  const sp = document.getElementById('swagger-page');
  sp.classList.add('active');
  document.getElementById('swagger-title').textContent = displayName;
  document.getElementById('swagger-container').innerHTML = '';
  location.hash = '#/spec/' + encodeURIComponent(name);

  SwaggerUIBundle({
    url: '/specs/' + encodeURIComponent(name) + '.json',
    dom_id: '#swagger-container',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
    deepLinking: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 1
  });
}

function showLanding() {
  document.getElementById('swagger-page').classList.remove('active');
  document.getElementById('landing').classList.remove('hidden');
  document.getElementById('swagger-container').innerHTML = '';
  location.hash = '';
}

window.addEventListener('hashchange', function() {
  if (!location.hash || location.hash === '#') {
    showLanding();
  } else if (location.hash.startsWith('#/spec/')) {
    const name = decodeURIComponent(location.hash.slice(7));
    const api = apis.find(a => a.name === name);
    if (api) showSwagger(api.name, api.display_name);
  }
});

init();
</script>
</body>
</html>

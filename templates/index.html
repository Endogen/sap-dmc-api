<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Digital Manufacturing Cloud — API Browser</title>
<link rel="icon" href="/favicon.png" type="image/png">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3343;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #4e9af5;
    --accent2: #3a7bd5;
    --green: #3ddc84;
    --orange: #f5a623;
    --red: #f5564e;
    --tag-bg: #262b3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 img {
    height: 28px;
    width: auto;
  }
  .header p {
    color: var(--text2);
    font-size: 14px;
  }
  .stats {
    display: flex;
    gap: 24px;
    margin-top: 12px;
  }
  .stat {
    font-size: 13px;
    color: var(--text2);
  }
  .stat strong {
    color: var(--accent);
    font-size: 18px;
    margin-right: 4px;
  }
  .downloads {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }
  .downloads-label {
    font-size: 13px;
    color: var(--text2);
  }
  .dl-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 0.2s, background 0.2s;
  }
  .dl-link:hover {
    border-color: var(--accent);
    background: rgba(78, 154, 245, 0.1);
  }
  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    flex: 1;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }
  .result-count {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }
  .result-count:empty {
    display: none;
  }
  .api-grid {
    padding: 16px 32px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 12px;
  }
  .api-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .api-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .api-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .api-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .api-version {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--tag-bg);
    border-radius: 4px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .api-desc {
    font-size: 13px;
    color: var(--text2);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .api-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
  }
  .api-meta span { display: flex; align-items: center; gap: 4px; }
  .api-actions {
    display: flex;
    gap: 8px;
    margin-top: auto;
    padding-top: 4px;
  }
  .btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }

  /* Swagger UI page */
  .swagger-page { display: none; }
  .swagger-page.active { display: block; }
  .landing-page.hidden { display: none; }
  .swagger-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .swagger-header .back-btn {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    font-family: inherit;
  }
  .swagger-header .back-btn:hover { text-decoration: underline; }
  .swagger-header .api-title {
    font-size: 16px;
    font-weight: 600;
  }
  #swagger-container {
    background: #fff;
    min-height: calc(100vh - 52px);
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px;
    color: var(--text2);
    font-size: 15px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    font-family: inherit;
  }
  .tab.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(78, 154, 245, 0.1);
  }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Changelog */
  .changelog {
    padding: 16px 32px 32px;
    max-width: 900px;
  }
  .changelog-empty {
    text-align: center;
    padding: 48px;
    color: var(--text2);
    font-size: 15px;
  }
  .changelog-filters {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .changelog-filters label {
    font-size: 13px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .changelog-filters input[type="checkbox"] {
    accent-color: var(--accent);
  }
  .cl-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .cl-entry-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .cl-entry-header:hover { background: var(--surface2); }
  .cl-date {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .cl-summary {
    font-size: 13px;
    color: var(--text2);
    flex: 1;
  }
  .cl-breaking-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--red);
    background: rgba(245, 86, 78, 0.15);
    padding: 2px 10px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .cl-chevron {
    color: var(--text2);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .cl-entry.open .cl-chevron { transform: rotate(90deg); }
  .cl-entry-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 20px 16px;
  }
  .cl-entry.open .cl-entry-body { display: block; }
  .cl-api {
    margin-bottom: 12px;
  }
  .cl-api:last-child { margin-bottom: 0; }
  .cl-api-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cl-api-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 1px 8px;
    border-radius: 4px;
  }
  .cl-api-badge.added { background: rgba(61, 220, 132, 0.15); color: var(--green); }
  .cl-api-badge.removed { background: rgba(245, 86, 78, 0.15); color: var(--red); }
  .cl-api-badge.changed { background: rgba(245, 166, 35, 0.15); color: var(--orange); }
  .cl-change {
    font-size: 13px;
    padding: 4px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: var(--text2);
  }
  .cl-icon {
    font-weight: 700;
    font-size: 14px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1.5;
  }
  .cl-icon.add { color: var(--green); }
  .cl-icon.remove { color: var(--red); }
  .cl-icon.modify { color: var(--orange); }
  .cl-breaking-badge {
    font-size: 10px;
    font-weight: 700;
    color: var(--red);
    background: rgba(245, 86, 78, 0.15);
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .cl-change-detail {
    flex: 1;
    word-break: break-word;
  }
  .cl-change-detail code {
    font-size: 12px;
    background: var(--tag-bg);
    padding: 1px 5px;
    border-radius: 3px;
  }

  @media (max-width: 600px) {
    .header, .controls, .api-grid, .changelog, .changelog-filters { padding-left: 16px; padding-right: 16px; }
    .api-grid { grid-template-columns: 1fr; }
    .stats { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>

<!-- Landing Page -->
<div class="landing-page" id="landing">
  <div class="header">
    <div class="header-top">
      <h1><img src="/logo.png" alt="SAP">SAP Digital Manufacturing Cloud — APIs</h1>
      <div class="tabs">
        <button class="tab active" data-tab="apis">APIs</button>
        <button class="tab" data-tab="changelog">Changelog</button>
      </div>
    </div>
    <p>Browse and explore all API specifications from the SAP DMC package</p>
    <div class="stats">
      <div class="stat"><strong id="api-count">0</strong> APIs</div>
      <div class="stat"><strong id="endpoint-count">0</strong> Endpoints</div>
      <div class="stat"><strong id="schema-count">0</strong> Schemas</div>
    </div>
    <div class="downloads">
      <span class="downloads-label">Export:</span>
      <a href="/summary.json" target="_blank" class="dl-link">Summary JSON</a>
      <a href="/collections/postman_collection.json" target="_blank" class="dl-link">Postman Collection</a>
      <a href="/collections/insomnia_collection.json" target="_blank" class="dl-link">Insomnia Collection</a>
    </div>
  </div>
  <div class="tab-content active" id="tab-apis">
    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="Search APIs by name, description, or endpoint path..." autocomplete="off">
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="api-grid" id="api-grid"></div>
  </div>
  <div class="tab-content" id="tab-changelog">
    <div class="changelog-filters">
      <label><input type="checkbox" id="breaking-only"> Show breaking only</label>
    </div>
    <div class="changelog" id="changelog"></div>
  </div>
</div>

<!-- Swagger UI Page -->
<div class="swagger-page" id="swagger-page">
  <div class="swagger-header">
    <button class="back-btn" onclick="showLanding()">&#8592; Back to APIs</button>
    <span class="api-title" id="swagger-title"></span>
  </div>
  <div id="swagger-container"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>

<script>
let apis = [];
let changelog = null;

async function init() {
  const resp = await fetch('/summary.json');
  apis = await resp.json();

  // Stats
  let totalEndpoints = 0, totalSchemas = 0;
  apis.forEach(a => { totalEndpoints += a.endpoint_count; totalSchemas += a.schema_count; });
  document.getElementById('api-count').textContent = apis.length;
  document.getElementById('endpoint-count').textContent = totalEndpoints;
  document.getElementById('schema-count').textContent = totalSchemas;

  renderGrid(apis);

  // Check URL hash
  if (location.hash.startsWith('#/spec/')) {
    const name = decodeURIComponent(location.hash.slice(7));
    const api = apis.find(a => a.name === name);
    if (api) showSwagger(api.name, api.display_name);
  } else if (location.hash === '#/changelog') {
    switchTab('changelog');
  }
}

function renderGrid(list) {
  const grid = document.getElementById('api-grid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">No APIs match your search.</div>';
    document.getElementById('result-count').textContent = '0 results';
    return;
  }
  document.getElementById('result-count').textContent = list.length === apis.length ? '' : list.length + ' result' + (list.length !== 1 ? 's' : '');

  grid.innerHTML = list.map(api => `
    <div class="api-card">
      <div class="api-card-head">
        <span class="api-name">${esc(api.display_name)}</span>
        <span class="api-version">${esc(api.api_version || api.version || '—')}</span>
      </div>
      <div class="api-desc">${esc(api.description || 'No description')}</div>
      <div class="api-meta">
        <span>${api.endpoint_count} endpoint${api.endpoint_count !== 1 ? 's' : ''}</span>
        <span>${api.schema_count} schema${api.schema_count !== 1 ? 's' : ''}</span>
        <span>Spec ${esc(api.spec_version)}</span>
      </div>
      <div class="api-actions">
        <a class="btn btn-primary" href="#/spec/${encodeURIComponent(api.name)}" onclick="showSwagger('${esc(api.name)}', '${esc(api.display_name)}')">View API</a>
        <a class="btn btn-secondary" href="/specs/${encodeURIComponent(api.name)}.json" target="_blank">Download JSON</a>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { renderGrid(apis); return; }
  const filtered = apis.filter(a => {
    if ((a.display_name || '').toLowerCase().includes(q)) return true;
    if ((a.description || '').toLowerCase().includes(q)) return true;
    if ((a.name || '').toLowerCase().includes(q)) return true;
    if (a.endpoints && a.endpoints.some(e => (e.path || '').toLowerCase().includes(q) || (e.summary || '').toLowerCase().includes(q))) return true;
    return false;
  });
  renderGrid(filtered);
});

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    switchTab(this.dataset.tab);
  });
});

let _suppressHashChange = false;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-apis').classList.toggle('active', tab === 'apis');
  document.getElementById('tab-changelog').classList.toggle('active', tab === 'changelog');

  // Update hash without triggering hashchange listener
  const targetHash = tab === 'changelog' ? '#/changelog' : '';
  if (location.hash !== targetHash) {
    _suppressHashChange = true;
    location.hash = targetHash;
  }

  if (tab === 'changelog') {
    loadChangelog();
  }
}

// Changelog
async function loadChangelog() {
  if (changelog !== null) {
    renderChangelog();
    return;
  }
  const el = document.getElementById('changelog');
  el.innerHTML = '<div class="changelog-empty">Loading...</div>';
  try {
    const resp = await fetch('/changelog.json');
    if (!resp.ok) { changelog = []; }
    else { changelog = await resp.json(); }
  } catch (e) { changelog = []; }
  renderChangelog();
}

document.getElementById('breaking-only').addEventListener('change', renderChangelog);

function renderChangelog() {
  const el = document.getElementById('changelog');
  const breakingOnly = document.getElementById('breaking-only').checked;

  let entries = changelog || [];
  if (breakingOnly) {
    entries = entries.filter(e => e.summary && e.summary.breaking_changes > 0);
  }

  if (entries.length === 0) {
    el.innerHTML = '<div class="changelog-empty">No changelog entries' + (breakingOnly ? ' with breaking changes' : '') + '.</div>';
    return;
  }

  el.innerHTML = entries.map((entry, i) => {
    const s = entry.summary || {};
    const parts = [];
    if (s.apis_added) parts.push(s.apis_added + ' API' + (s.apis_added !== 1 ? 's' : '') + ' added');
    if (s.apis_removed) parts.push(s.apis_removed + ' API' + (s.apis_removed !== 1 ? 's' : '') + ' removed');
    if (s.apis_changed) parts.push(s.apis_changed + ' API' + (s.apis_changed !== 1 ? 's' : '') + ' changed');
    if (s.endpoints_added) parts.push(s.endpoints_added + ' new endpoint' + (s.endpoints_added !== 1 ? 's' : ''));
    if (s.endpoints_removed) parts.push(s.endpoints_removed + ' endpoint' + (s.endpoints_removed !== 1 ? 's' : '') + ' removed');
    const summaryText = parts.join(' &middot; ') || 'No changes';
    const breakingHtml = s.breaking_changes > 0
      ? '<span class="cl-breaking-count">' + s.breaking_changes + ' breaking</span>'
      : '';

    let changesHtml = '';
    if (entry.changes && entry.changes.length > 0) {
      changesHtml = entry.changes.map(ac => {
        let apiChanges = '';
        if (ac.type === 'added') {
          apiChanges = '<div class="cl-change"><span class="cl-icon add">+</span><span class="cl-change-detail">New API added</span></div>';
        } else if (ac.type === 'removed') {
          apiChanges = '<div class="cl-change"><span class="cl-icon remove">&minus;</span><span class="cl-change-detail">API removed</span><span class="cl-breaking-badge">breaking</span></div>';
        } else if (ac.changes) {
          const filtered = breakingOnly ? ac.changes.filter(c => c.breaking) : ac.changes;
          apiChanges = filtered.map(c => renderChange(c)).join('');
        }
        if (breakingOnly && ac.type === 'changed') {
          const hasBreaking = ac.changes && ac.changes.some(c => c.breaking);
          if (!hasBreaking) return '';
        }
        const badgeClass = ac.type === 'added' ? 'added' : ac.type === 'removed' ? 'removed' : 'changed';
        return '<div class="cl-api">'
          + '<div class="cl-api-name">' + esc(ac.display_name || ac.api) + ' <span class="cl-api-badge ' + badgeClass + '">' + ac.type + '</span></div>'
          + apiChanges
          + '</div>';
      }).filter(Boolean).join('');
    }

    return '<div class="cl-entry">'
      + '<div class="cl-entry-header" onclick="this.parentElement.classList.toggle(\'open\')">'
      + '<span class="cl-date">' + esc(entry.date) + '</span>'
      + '<span class="cl-summary">' + summaryText + '</span>'
      + breakingHtml
      + '<span class="cl-chevron">&#9654;</span>'
      + '</div>'
      + '<div class="cl-entry-body">' + (changesHtml || '<div class="cl-change"><span class="cl-change-detail">No details available</span></div>') + '</div>'
      + '</div>';
  }).join('');
}

function renderChange(c) {
  const icon = changeIcon(c.kind, c.breaking);
  const badge = c.breaking ? '<span class="cl-breaking-badge">breaking</span>' : '';
  return '<div class="cl-change">'
    + '<span class="cl-icon ' + icon.cls + '">' + icon.sym + '</span>'
    + '<span class="cl-change-detail">' + changeText(c) + '</span>'
    + badge
    + '</div>';
}

function changeIcon(kind, breaking) {
  if (kind.includes('added') || kind === 'schema_field_required') return { sym: '+', cls: 'add' };
  if (kind.includes('removed') || breaking) return { sym: '\u2212', cls: 'remove' };
  return { sym: '~', cls: 'modify' };
}

function changeText(c) {
  switch (c.kind) {
    case 'endpoint_added':
      return '<code>' + esc(c.method + ' ' + c.path) + '</code> ' + esc(c.summary || '');
    case 'endpoint_removed':
      return '<code>' + esc(c.method + ' ' + c.path) + '</code> ' + esc(c.summary || '');
    case 'param_added':
      return 'Parameter <code>' + esc(c.param) + '</code> added to <code>' + esc(c.endpoint) + '</code>' + (c.required ? ' (required)' : '');
    case 'param_removed':
      return 'Parameter <code>' + esc(c.param) + '</code> removed from <code>' + esc(c.endpoint) + '</code>';
    case 'request_field_added':
      return 'Request field <code>' + esc(c.field) + '</code> added to <code>' + esc(c.endpoint) + '</code>' + (c.required ? ' (required)' : '');
    case 'request_field_removed':
      return 'Request field <code>' + esc(c.field) + '</code> removed from <code>' + esc(c.endpoint) + '</code>';
    case 'request_type_changed':
      return 'Request field <code>' + esc(c.field) + '</code> type changed: <code>' + esc(c.old_type) + '</code> &rarr; <code>' + esc(c.new_type) + '</code> on <code>' + esc(c.endpoint) + '</code>';
    case 'response_field_added':
      return 'Response field <code>' + esc(c.field) + '</code> added to <code>' + esc(c.endpoint) + '</code>';
    case 'response_field_removed':
      return 'Response field <code>' + esc(c.field) + '</code> removed from <code>' + esc(c.endpoint) + '</code>';
    case 'response_type_changed':
      return 'Response field <code>' + esc(c.field) + '</code> type changed: <code>' + esc(c.old_type) + '</code> &rarr; <code>' + esc(c.new_type) + '</code> on <code>' + esc(c.endpoint) + '</code>';
    case 'schema_added':
      return 'Schema <code>' + esc(c.schema) + '</code> added';
    case 'schema_removed':
      return 'Schema <code>' + esc(c.schema) + '</code> removed';
    case 'schema_field_added':
      return 'Field <code>' + esc(c.field) + '</code> added to <code>' + esc(c.schema) + '</code>' + (c.type ? ' (' + esc(c.type) + ')' : '');
    case 'schema_field_removed':
      return 'Field <code>' + esc(c.field) + '</code> removed from <code>' + esc(c.schema) + '</code>';
    case 'schema_type_changed':
      return 'Field <code>' + esc(c.field) + '</code> type changed in <code>' + esc(c.schema) + '</code>: <code>' + esc(c.old_type) + '</code> &rarr; <code>' + esc(c.new_type) + '</code>';
    case 'schema_field_required':
      return 'Field <code>' + esc(c.field) + '</code> now required in <code>' + esc(c.schema) + '</code>';
    case 'version_changed':
      return 'API version changed: <code>' + esc(c.old_version) + '</code> &rarr; <code>' + esc(c.new_version) + '</code>';
    default:
      return esc(c.kind);
  }
}

function showSwagger(name, displayName) {
  document.getElementById('landing').classList.add('hidden');
  const sp = document.getElementById('swagger-page');
  sp.classList.add('active');
  document.getElementById('swagger-title').textContent = displayName;
  document.getElementById('swagger-container').innerHTML = '';
  location.hash = '#/spec/' + encodeURIComponent(name);

  SwaggerUIBundle({
    url: '/specs/' + encodeURIComponent(name) + '.json',
    dom_id: '#swagger-container',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
    deepLinking: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 1
  });
}

function showLanding() {
  document.getElementById('swagger-page').classList.remove('active');
  document.getElementById('landing').classList.remove('hidden');
  document.getElementById('swagger-container').innerHTML = '';
  location.hash = '';
}

window.addEventListener('hashchange', function() {
  if (_suppressHashChange) {
    _suppressHashChange = false;
    return;
  }
  if (!location.hash || location.hash === '#') {
    showLanding();
    switchTab('apis');
  } else if (location.hash.startsWith('#/spec/')) {
    const name = decodeURIComponent(location.hash.slice(7));
    const api = apis.find(a => a.name === name);
    if (api) showSwagger(api.name, api.display_name);
  } else if (location.hash === '#/changelog') {
    showLanding();
    switchTab('changelog');
  }
});

init();
</script>
